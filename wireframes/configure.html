<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maven Manage — Configurations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ===== PAGE WRAP ===== */
    .cfg-page {
      flex: 1; overflow-y: auto;
      padding: 24px 40px 48px;
      background: var(--color-background-primary);
    }

    /* ===== TITLE ROW ===== */
    .cfg-title-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .cfg-title {
      font-family: var(--font-display); font-size: 20px; font-weight: 700;
      color: var(--color-text-primary); letter-spacing: -0.01em;
    }
    .cfg-title-actions { display: flex; align-items: center; gap: 18px; }
    .cfg-add-btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 36px; padding: 0 18px;
      background: var(--color-navy); color: #fff;
      border: 0.5px solid var(--color-navy); border-radius: var(--border-radius-sm);
      font-family: var(--font-display); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.12s;
    }
    .cfg-add-btn:hover { background: #4F5988; }
    .cfg-download-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-display); font-size: 13px; font-weight: 600;
      color: var(--color-navy); cursor: pointer;
      text-decoration: none;
    }
    .cfg-download-link:hover { color: var(--color-navy-lt); }

    /* ===== TABS ===== */
    .cfg-tabs {
      display: flex; gap: 28px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      margin-bottom: 18px;
    }
    .cfg-tab {
      position: relative; padding: 10px 0 12px;
      font-family: var(--font-display); font-size: 13px; font-weight: 600;
      color: var(--color-text-secondary); cursor: pointer;
      background: none; border: none;
    }
    .cfg-tab:hover { color: var(--color-text-primary); }
    .cfg-tab.active { color: var(--color-navy-lt); }
    .cfg-tab.active::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -0.5px;
      height: 2px; background: var(--color-navy-lt);
    }

    /* ===== FILTER ROW ===== */
    .cfg-filter-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .cfg-filter-pill {
      display: inline-flex; align-items: center; gap: 8px;
      height: 36px; padding: 0 14px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-sm);
      background: var(--color-background-primary);
      font-family: var(--font-body); font-size: 13px;
      color: var(--color-text-primary);
      cursor: pointer; appearance: none; -webkit-appearance: none;
      padding-right: 32px;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238A8894' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
      outline: none; min-width: 132px;
    }
    .cfg-filter-pill:focus { border-color: var(--color-navy-lt); }
    .cfg-filter-pill.advanced {
      padding-left: 36px;
      background-image:
        url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 6h18M7 12h10M10 18h4' stroke='%238A8894' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"),
        url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238A8894' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat, no-repeat;
      background-position: left 12px center, right 12px center;
    }
    .cfg-reset {
      font-family: var(--font-display); font-size: 13px; font-weight: 600;
      color: var(--color-navy-lt); cursor: pointer;
      background: none; border: none; padding: 0 6px;
    }
    .cfg-reset:hover { color: var(--color-navy); }
    .cfg-filter-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }
    .cfg-sort {
      display: inline-flex; align-items: center;
      height: 36px; padding: 0 32px 0 14px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-sm);
      background: var(--color-background-primary);
      font-family: var(--font-body); font-size: 13px;
      color: var(--color-text-primary);
      cursor: pointer; appearance: none; -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%238A8894' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 12px center;
      outline: none; min-width: 220px;
    }
    .cfg-sort:focus { border-color: var(--color-navy-lt); }

    /* ===== VIEW TOGGLE (Cards | Table) ===== */
    .cfg-view-toggle {
      display: inline-flex;
      height: 36px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-sm);
      background: var(--color-background-primary);
      overflow: hidden;
    }
    .cfg-view-btn {
      width: 38px; height: 100%;
      background: none; border: none; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .cfg-view-btn + .cfg-view-btn {
      border-left: 0.5px solid var(--color-border-secondary);
    }
    .cfg-view-btn:hover {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
    }
    .cfg-view-btn.active {
      background: #EEF2FF;
      color: var(--color-navy);
    }

    /* ===== FLAT TABLE VIEW ===== */
    .cfg-data-table {
      width: 100%;
      border-collapse: separate; border-spacing: 0;
      background: var(--color-background-primary);
    }
    .cfg-data-table thead tr {
      background: var(--color-background-secondary);
    }
    .cfg-data-table th {
      padding: 12px 16px; text-align: left;
      font-family: var(--font-display); font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      white-space: nowrap;
      user-select: none;
    }
    .cfg-data-table th.sortable { cursor: pointer; }
    .cfg-data-table th.sortable:hover { color: var(--color-text-primary); }
    .cfg-data-table .sort-arrow {
      display: inline-block;
      margin-left: 5px;
      font-size: 10px;
      color: var(--color-text-tertiary);
    }
    .cfg-data-table th.sortable.active .sort-arrow {
      color: var(--color-text-primary);
    }
    .cfg-data-table td {
      padding: 14px 16px;
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      color: var(--color-text-primary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      vertical-align: middle;
    }
    .cfg-data-table tbody tr:last-child td { border-bottom: none; }
    .cfg-data-table tbody tr { transition: background 0.1s; }
    .cfg-data-table tbody tr:hover { background: var(--color-background-secondary); }

    .cfg-data-table .col-chevron {
      width: 36px;
      padding-left: 14px; padding-right: 0;
      color: var(--color-text-tertiary);
    }
    .cfg-row-chevron {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px;
      transition: transform 0.18s;
    }
    .cfg-table-row { cursor: pointer; }
    .cfg-table-row.expanded { background: var(--color-background-secondary); }
    .cfg-table-row.expanded .cfg-row-chevron {
      transform: rotate(180deg);
      color: var(--color-navy);
    }
    .cfg-table-subrow > td {
      padding: 0 !important;
      background: var(--color-background-tertiary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .cfg-table-subrow .cfg-events-table {
      margin: 0;
    }
    /* Sub-table inside the expanded row */
    .cfg-table-subrow .cfg-events-table th  { background: var(--color-background-secondary); }
    .cfg-table-subrow .cfg-events-table tbody tr { background: var(--color-background-primary); }

    .cfg-data-table .col-id {
      color: var(--color-text-secondary);
      font-weight: 500;
      white-space: nowrap;
      width: 64px;
    }
    .cfg-data-table .col-account {
      font-weight: 700; color: var(--color-navy);
    }
    .cfg-data-table .col-convs-count { font-weight: 600; }
    .cfg-data-table .col-actions {
      text-align: right; white-space: nowrap;
      width: 92px; padding-right: 16px;
    }
    .cfg-action-btn {
      width: 28px; height: 28px;
      background: none; border: none; padding: 0;
      border-radius: 4px;
      color: var(--color-text-tertiary);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      margin-left: 2px;
      transition: background 0.1s, color 0.1s;
    }
    .cfg-action-btn:hover {
      background: var(--color-background-secondary);
      color: var(--color-navy);
    }

    /* ===== FLAT VIEW (option C) ===== */
    .cfg-flat-table .col-outbound {
      font-weight: 700; color: var(--color-navy-lt);
    }
    .cfg-flat-table .cfg-empty-cell {
      color: var(--color-text-tertiary);
    }
    /* Left bar on every row's first cell, group-hover treatment to match Grouped view */
    .cfg-flat-table tbody.cfg-flat-group td:first-child {
      position: relative;
    }
    .cfg-flat-table tbody.cfg-flat-group td:first-child::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--color-border-secondary);
      transition: background 0.12s;
    }
    .cfg-flat-table tbody.cfg-flat-group .cfg-flat-last td:first-child::before {
      bottom: 3px;
    }
    .cfg-flat-table tbody.cfg-flat-group:hover tr {
      background: var(--color-background-secondary);
    }
    .cfg-flat-table tbody.cfg-flat-group:hover td:first-child::before {
      background: var(--color-navy-dark);
    }

    /* ===== GROUPED VIEW (option D) ===== */
    .cfg-grouped-table {
      width: 100%;
      border-collapse: separate; border-spacing: 0;
      background: var(--color-background-primary);
    }
    .cfg-grouped-table thead tr { background: var(--color-background-secondary); }
    .cfg-grouped-table th {
      padding: 12px 16px; text-align: left;
      font-family: var(--font-display); font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      white-space: nowrap;
    }
    .cfg-grouped-table th:first-child { padding-left: 56px; }

    /* Parent strip — full-width metadata row */
    .cfg-parent-row > td {
      padding: 0 !important;
      border-top: 0.5px solid var(--color-border-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }
    .cfg-parent-strip {
      display: flex; align-items: center; gap: 22px;
      padding: 14px 20px;
      background: var(--color-background-primary);
      border-left: 4px solid var(--color-border-secondary);
      transition: border-left-color 0.12s, background 0.12s;
    }
    .cfg-group:hover .cfg-parent-strip {
      border-left-color: var(--color-navy-dark);
      background: var(--color-background-secondary);
    }
    .cfg-parent-strip .cfg-id {
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      color: var(--color-text-secondary);
    }
    .cfg-parent-strip .cfg-account-name {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      color: var(--color-navy);
    }
    .cfg-parent-strip .cfg-parent-meta {
      font-family: var(--font-display); font-size: 13px;
      color: var(--color-text-secondary);
    }
    .cfg-parent-strip .cfg-parent-meta-strong {
      color: var(--color-text-primary); font-weight: 600;
      margin-left: 4px;
    }
    .cfg-parent-strip .cfg-parent-actions {
      margin-left: auto;
      display: inline-flex; gap: 2px;
    }
    .cfg-parent-strip .cfg-parent-date {
      font-family: var(--font-display); font-size: 12px;
      color: var(--color-text-secondary);
    }

    /* Child event rows */
    .cfg-grouped-table .cfg-child-row td {
      padding: 11px 16px;
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      color: var(--color-text-primary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      vertical-align: middle;
    }
    .cfg-grouped-table .cfg-child-row td:first-child {
      padding-left: 56px;
      font-weight: 700;
      color: var(--color-navy-lt);
    }
    .cfg-grouped-table .cfg-empty-row td {
      padding: 18px 20px 18px 56px;
      font-size: 13px; font-style: italic;
      color: var(--color-text-tertiary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }

    /* ===== Simple chevron icon (no border block) — leading indicator that a row has V/R rules ===== */
    .cfg-pair-chev-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 12px; height: 12px;
      margin-right: 10px;
      vertical-align: middle;
      color: var(--color-text-secondary);
      transition: color 0.12s, transform 0.18s;
    }
    .cfg-pair-chev-spacer {
      display: inline-block;
      width: 12px; height: 12px;
      margin-right: 10px;
      vertical-align: middle;
    }
    .cfg-child-row.cfg-has-pairs,
    .cfg-flat-row.cfg-has-pairs { cursor: pointer; }

    /* Selected state — conversion row whose pairs sub-row is open */
    .cfg-child-row.cfg-selected,
    .cfg-flat-row.cfg-selected {
      background: var(--color-background-secondary);
    }
    .cfg-child-row.cfg-selected .cfg-pair-chev-icon,
    .cfg-flat-row.cfg-selected .cfg-pair-chev-icon {
      color: var(--color-navy-dark);
      transform: rotate(90deg);
    }

    /* ===== Pairs sub-row (inline, expands directly beneath the conversion) ===== */
    .cfg-pairs-row > td {
      padding: 0 !important;
      background: var(--color-background-primary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      position: relative;
    }
    .cfg-pairs-row > td::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--color-border-secondary);
      transition: background 0.12s;
    }
    .cfg-pairs-row.cfg-child-last > td::before,
    .cfg-pairs-row.cfg-flat-last > td::before {
      bottom: 3px;
    }
    .cfg-group:hover .cfg-pairs-row > td::before,
    .cfg-flat-group:hover .cfg-pairs-row > td::before {
      background: var(--color-navy-dark);
    }

    .cfg-pairs-panel {
      display: flex; flex-direction: column;
      padding: 6px 24px 10px 56px;
    }
    .cfg-pairs-panel-flat {
      padding-left: 24px;
    }
    /* Each value/revenue pair is its own row inside the panel */
    .cfg-vr-row {
      display: grid;
      grid-template-columns: 56px 80px 70px auto;
      column-gap: 12px;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 0.5px dashed var(--color-border-tertiary);
    }
    .cfg-vr-row:last-child { border-bottom: none; }
    .cfg-vr-label {
      font-family: var(--font-display); font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--color-text-secondary);
    }
    .cfg-vr-val {
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: var(--color-text-primary);
    }
    .cfg-vr-rev {
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      color: #03A300;
    }

    /* Per-group column header row (sits under the parent strip) */
    .cfg-grouped-table .cfg-col-row td {
      padding: 10px 16px;
      font-family: var(--font-display); font-size: 12px; font-weight: 500;
      color: var(--color-text-secondary);
      background: var(--color-background-secondary);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      white-space: nowrap;
    }
    .cfg-grouped-table .cfg-col-row td:first-child {
      padding-left: 56px;
    }

    /* Left bar continuation across column header + child rows (with 3px gap on the last row) */
    .cfg-grouped-table .cfg-col-row td:first-child,
    .cfg-grouped-table .cfg-child-row td:first-child,
    .cfg-grouped-table .cfg-empty-row td:first-child {
      position: relative;
    }
    .cfg-grouped-table .cfg-col-row td:first-child::before,
    .cfg-grouped-table .cfg-child-row td:first-child::before,
    .cfg-grouped-table .cfg-empty-row td:first-child::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--color-border-secondary);
      transition: background 0.12s;
    }
    .cfg-grouped-table .cfg-child-last td:first-child::before {
      bottom: 3px;
    }
    .cfg-group:hover .cfg-col-row td:first-child::before,
    .cfg-group:hover .cfg-child-row td:first-child::before,
    .cfg-group:hover .cfg-empty-row td:first-child::before {
      background: var(--color-navy-dark);
    }

    /* ===== SEARCH ===== */
    .cfg-search { position: relative; margin-bottom: 18px; }
    .cfg-search input {
      width: 100%; height: 40px;
      padding: 0 14px 0 38px;
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-sm);
      background: var(--color-background-primary);
      font-family: var(--font-body); font-size: 13px;
      color: var(--color-text-primary);
      outline: none;
    }
    .cfg-search input:focus { border-color: var(--color-navy-lt); }
    .cfg-search input::placeholder { color: var(--color-text-tertiary); }
    .cfg-search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--color-text-tertiary); pointer-events: none;
      width: 14px; height: 14px;
    }

    /* ===== CONFIG CARD ===== */
    .cfg-card {
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-primary);
      margin-bottom: 10px;
      overflow: hidden;
    }

    /* Closed-row layout: chevron + identity + meta + conversions + edit */
    .cfg-card-hdr {
      display: flex; align-items: center;
      gap: 22px;
      padding: 16px 20px;
      cursor: pointer; user-select: none;
      transition: background 0.1s;
    }
    .cfg-card-hdr:hover { background: var(--color-background-secondary); }

    .cfg-chevron {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px;
      color: var(--color-text-secondary);
      transition: transform 0.18s;
      flex-shrink: 0;
    }
    .cfg-card.expanded .cfg-chevron { transform: rotate(180deg); }

    /* Section 1: ID + Account name */
    .cfg-hdr-identity {
      display: flex; align-items: baseline; gap: 10px;
      flex: 0 0 280px;
      min-width: 0;
    }
    .cfg-id {
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
      color: var(--color-text-secondary);
      flex-shrink: 0;
    }
    .cfg-account-name {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      color: var(--color-navy);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Section 2 + 3: separate labeled attributes (TS, PS) */
    .cfg-hdr-attr {
      flex: 0 0 auto;
      display: inline-flex; align-items: baseline; gap: 6px;
      font-family: var(--font-display); font-size: 13px;
      white-space: nowrap; min-width: 0;
    }
    .cfg-hdr-attr .cfg-attr-label {
      color: var(--color-text-secondary); font-weight: 500;
    }
    .cfg-hdr-attr .cfg-attr-val {
      color: var(--color-text-primary); font-weight: 600;
    }
    .cfg-hdr-traffic { flex-basis: 200px; }
    .cfg-hdr-perf    { flex-basis: 240px; }

    /* Section 3: Conversions descriptive line */
    .cfg-hdr-convs {
      flex: 1; min-width: 0;
      font-family: var(--font-display); font-size: 13px;
      color: var(--color-text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .cfg-convs-label {
      color: var(--color-text-secondary);
      font-weight: 500;
      margin-right: 6px;
    }
    .cfg-convs-empty {
      color: var(--color-text-tertiary);
      font-style: italic;
    }
    .cfg-conv-arrow {
      color: var(--color-text-tertiary);
      margin: 0 5px;
    }
    .cfg-conv-more {
      color: var(--color-navy-lt);
      font-weight: 600;
      margin-left: 4px;
    }

    /* Edit icon */
    .cfg-edit-btn {
      flex-shrink: 0;
      width: 32px; height: 32px;
      background: none; border: none; padding: 0;
      border-radius: 6px;
      color: var(--color-text-secondary);
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .cfg-edit-btn:hover { background: var(--color-background-secondary); color: var(--color-navy); }

    /* ===== EXPANDED BODY (table) ===== */
    .cfg-card-body {
      display: none;
      border-top: 0.5px solid var(--color-border-tertiary);
      background: var(--color-background-primary);
    }
    .cfg-card.expanded .cfg-card-body { display: block; }

    .cfg-events-table {
      width: 100%;

  var total = events ? events.length : 0;
  if (total === 0) {
    return '<span class="cfg-convs-label">Conversions (0):</span>'
      + '<span class="cfg-convs-empty">none yet</span>';
  }
  var visible = events.slice(0, SHOWN_CONVS).map(function(e) {
    return escHtml(e.source) + '<span class="cfg-conv-arrow">→</span>' + escHtml(e.outbound);
  }).join(', ');
  var overflow = total - SHOWN_CONVS;
  return '<span class="cfg-convs-label">Conversions (' + total + '):</span>'
    + visible
    + (overflow > 0 ? '<span class="cfg-conv-more">, +' + overflow + ' more</span>' : '');
}

function buildEventsTable(events) {
  if (!events || events.length === 0) {
    return '<div class="cfg-body-empty">No conversions configured for this rule yet.</div>';
  }
  var rows = events.map(function(e) {
    var allowClass = e.allow === 'Yes' ? 'cfg-evt-allow-yes' : 'cfg-evt-allow-no';
    return '<tr>'
      + '<td>' + escHtml(e.outbound) + '</td>'
      + '<td>' + escHtml(e.source) + '</td>'
      + '<td>' + escHtml(e.backfill) + '</td>'
      + '<td>' + escHtml(e.valueType) + '</td>'
      + '<td class="' + allowClass + '">' + escHtml(e.allow) + '</td>'
      + '</tr>';
  }).join('');
  return '<table class="cfg-events-table">'
    + '<thead><tr>'
    +   '<th>Outbound Event</th>'
    +   '<th>Source Event</th>'
    +   '<th>Backfill Date</th>'
    +   '<th>Value Type</th>'
    +   '<th>Allow Updates</th>'
    + '</tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>';
}

function toggleTableRow(i) {
  var row = document.querySelector('.cfg-table-row[data-tidx="' + i + '"]');
  var sub = document.querySelector('.cfg-table-subrow[data-sub="' + i + '"]');
  if (!row || !sub) return;
  var isOpen = row.classList.toggle('expanded');
  sub.style.display = isOpen ? '' : 'none';
}

/* Toggle the pairs sub-row beneath a conversion. Swaps the cfg-child-last /
   cfg-flat-last 3px-gap class so the gap stays at the visually-last row of
   the group whether the conversion is collapsed or expanded. */
function toggleConvPairs(rowKey) {
  var row   = document.querySelector('[data-conv="' + rowKey + '"]');
  var pairs = document.querySelector('[data-conv-pairs="' + rowKey + '"]');
  if (!row || !pairs) return;

  var isOpen = row.classList.toggle('cfg-selected');
  pairs.style.display = isOpen ? '' : 'none';

  if (!row.classList.contains('cfg-conv-last')) return;
  var gapCls = row.classList.contains('cfg-flat-row') ? 'cfg-flat-last' : 'cfg-child-last';
  if (isOpen) {
    row.classList.remove(gapCls);
    pairs.classList.add(gapCls);
  } else {
    pairs.classList.remove(gapCls);
    row.classList.add(gapCls);
  }
}


/* ===== FLAT VIEW (option C) — one row per conversion ===== */
function renderFlat() {
  var editSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 3l5 5-11 11H5v-5L16 3z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>';
  var chevronSvg = '<svg width="9" height="9" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function renderRow(r, isLast) {
    var preselect = (r.conversionIdx >= 0) ? r.conversionIdx : 0;
    var hasPairs = Array.isArray(r.pairs) && r.pairs.length > 0;
    var lastCls = isLast ? ' cfg-flat-last' : '';

    var actionsCell = '<td class="col-actions">'
      + '<button class="cfg-action-btn" title="Edit Configuration" onclick="openEditDrawer(' + r.configIdx + ', ' + preselect + ');">' + editSvg + '</button>'
      + '</td>';

    var pairsClass = hasPairs ? ' cfg-has-pairs' : '';
    var convLast = isLast ? ' cfg-conv-last' : '';
    var rowKey = 'f-' + r.configIdx + '-' + r.conversionIdx;
    var clickAttr = hasPairs
      ? ' data-conv="' + rowKey + '" onclick="toggleConvPairs(\'' + rowKey + '\')"'
      : '';
    var leadIcon = hasPairs
      ? '<span class="cfg-pair-chev-icon">' + chevronSvg + '</span>'
      : '<span class="cfg-pair-chev-spacer"></span>';

    var mainRow;
    if (r.empty) {
      mainRow = '<tr class="' + ('cfg-flat-row' + lastCls + convLast + pairsClass).trim() + '"' + clickAttr + '>'
        + '<td class="col-id">' + leadIcon + r.configId + '</td>'
        + '<td class="col-account">' + escHtml(r.account) + '</td>'
        + '<td>' + escHtml(r.ts) + '</td>'
        + '<td>' + escHtml(r.ps || '—') + '</td>'
        + '<td class="cfg-empty-cell">—</td>'
        + '<td class="cfg-empty-cell">—</td>'
        + '<td class="cfg-empty-cell">—</td>'
        + '<td class="cfg-empty-cell">—</td>'
        + '<td class="cfg-empty-cell">—</td>'
        + '<td>' + escHtml(r.date) + '</td>'
        + actionsCell
        + '</tr>';
    } else {
      var allowClass = r.allow === 'Yes' ? 'cfg-evt-allow-yes' : 'cfg-evt-allow-no';
      mainRow = '<tr class="' + ('cfg-flat-row' + lastCls + convLast + pairsClass).trim() + '"' + clickAttr + '>'
        + '<td class="col-id">' + leadIcon + r.configId + '</td>'
        + '<td class="col-account">' + escHtml(r.account) + '</td>'
        + '<td>' + escHtml(r.ts) + '</td>'
        + '<td>' + escHtml(r.ps || '—') + '</td>'
        + '<td>' + escHtml(r.source) + '</td>'
        + '<td class="col-outbound">' + escHtml(r.outbound) + '</td>'
        + '<td>' + escHtml(r.backfill) + '</td>'
        + '<td>' + escHtml(r.valueType) + '</td>'
        + '<td class="' + allowClass + '">' + escHtml(r.allow) + '</td>'
        + '<td>' + escHtml(r.date) + '</td>'
        + actionsCell
        + '</tr>';
    }

    if (!hasPairs) return mainRow;

    var pairLinesHtml = r.pairs.map(function(p) {
      return '<div class="cfg-vr-row">'
        + '<span class="cfg-vr-label">VALUE</span>'
        + '<span class="cfg-vr-val">' + escHtml(p.value) + '</span>'
        + '<span class="cfg-vr-label">REVENUE</span>'
        + '<span class="cfg-vr-rev">' + escHtml(p.revenue) + '</span>'
        + '</div>';
    }).join('');

    var pairsSubRow = '<tr class="cfg-pairs-row' + convLast + '" data-conv-pairs="' + rowKey + '" style="display:none;">'
      + '<td colspan="11"><div class="cfg-pairs-panel cfg-pairs-panel-flat">' + pairLinesHtml + '</div></td>'
      + '</tr>';

    return mainRow + pairsSubRow;
  }

  var rowsHtml = CONFIGS.map(function(c, ci) {
    var groupRows = [];
    if (!c.events || c.events.length === 0) {
      groupRows.push({
        configIdx: ci, conversionIdx: -1,
        configId: c.id, account: c.account, ts: c.source, ps: c.ps,
        date: c.date, empty: true
      });
    } else {
      c.events.forEach(function(e, ei) {
        groupRows.push({
          configIdx: ci, conversionIdx: ei,
          configId: c.id, account: c.account, ts: c.source, ps: c.ps,
          source: e.source, outbound: e.outbound, backfill: e.backfill,
          valueType: e.valueType, allow: e.allow, date: c.date,
          pairs: e.pairs, empty: false
        });
      });
    }

    var lastIdx = groupRows.length - 1;
    var trsHtml = groupRows.map(function(r, i) {
      return renderRow(r, i === lastIdx);
    }).join('');

    return '<tbody class="cfg-flat-group">' + trsHtml + '</tbody>';
  }).join('');

  document.getElementById('cfg-flat').innerHTML =
    '<table class="cfg-data-table cfg-flat-table">'
    + '<thead><tr>'
    +   '<th class="sortable active">ID <span class="sort-arrow">↓</span></th>'
    +   '<th class="sortable">Account <span class="sort-arrow">↓</span></th>'
    +   '<th>Traffic Source</th>'
    +   '<th>Performance Source</th>'
    +   '<th>Source Event</th>'
    +   '<th>Outbound Event</th>'
    +   '<th>Backfill Date</th>'
    +   '<th>Value Type</th>'
    +   '<th>Allow Updates</th>'
    +   '<th>Date Created</th>'
    +   '<th>Action</th>'
    + '</tr></thead>'
    + rowsHtml
    + '</table>';
}

/* ===== GROUPED VIEW (option D) — parent rows + always-rendered children ===== */
function renderGrouped() {
  var eyeSvg  = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>';
  var editSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 3l5 5-11 11H5v-5L16 3z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>';
  var chevronSvg = '<svg width="9" height="9" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  var bodyHtml = CONFIGS.map(function(c, ci) {
    var convsCount = c.events ? c.events.length : 0;
    var parentRow = '<tr class="cfg-parent-row">'
      + '<td colspan="5">'
      +   '<div class="cfg-parent-strip">'
      +     '<span class="cfg-id">ID ' + c.id + '</span>'
      +     '<span class="cfg-account-name">' + escHtml(c.account) + '</span>'
      +     '<span class="cfg-parent-meta"><span class="cfg-parent-meta-strong">' + escHtml(c.source) + '</span> · <span class="cfg-parent-meta-strong">' + escHtml(c.ps || '—') + '</span></span>'
      +     '<span class="cfg-parent-meta">' + convsCount + ' conversion' + (convsCount === 1 ? '' : 's') + '</span>'
      +     '<span class="cfg-parent-actions">'
      +       '<span class="cfg-parent-date">' + escHtml(c.date) + '</span>'
      +       '<button class="cfg-action-btn" title="View" onclick="event.stopPropagation();">' + eyeSvg + '</button>'
      +       '<button class="cfg-action-btn" title="Edit" onclick="event.stopPropagation(); openEditDrawer(' + ci + ', 0);">' + editSvg + '</button>'
      +     '</span>'
      +   '</div>'
      + '</td>'
      + '</tr>';

    var colRow = '<tr class="cfg-col-row">'
      + '<td>Outbound Event</td>'
      + '<td>Source Event</td>'
      + '<td>Backfill Date</td>'
      + '<td>Value Type</td>'
      + '<td>Allow Updates</td>'
      + '</tr>';

    var childRows;
    if (!c.events || c.events.length === 0) {
      childRows = '<tr class="cfg-empty-row cfg-child-last"><td colspan="5">No conversions configured for this rule yet.</td></tr>';
    } else {
      var lastIdx = c.events.length - 1;
      childRows = c.events.map(function(e, i) {
        var allowClass = e.allow === 'Yes' ? 'cfg-evt-allow-yes' : 'cfg-evt-allow-no';
        var hasPairs   = Array.isArray(e.pairs) && e.pairs.length > 0;
        var isLast     = (i === lastIdx);
        var lastClass  = isLast ? ' cfg-child-last' : '';
        var convLast   = isLast ? ' cfg-conv-last' : '';
        var pairsClass = hasPairs ? ' cfg-has-pairs' : '';
        var rowKey     = 'g-' + ci + '-' + i;
        var clickAttr  = hasPairs
          ? ' data-conv="' + rowKey + '" onclick="toggleConvPairs(\'' + rowKey + '\')"'
          : '';
        var leadIcon = hasPairs
          ? '<span class="cfg-pair-chev-icon">' + chevronSvg + '</span>'
          : '<span class="cfg-pair-chev-spacer"></span>';

        var mainRow = '<tr class="cfg-child-row' + lastClass + convLast + pairsClass + '"' + clickAttr + '>'
          + '<td>' + leadIcon + escHtml(e.outbound) + '</td>'
          + '<td>' + escHtml(e.source) + '</td>'
          + '<td>' + escHtml(e.backfill) + '</td>'
          + '<td>' + escHtml(e.valueType) + '</td>'
          + '<td class="' + allowClass + '">' + escHtml(e.allow) + '</td>'
          + '</tr>';

        if (!hasPairs) return mainRow;

        var pairLinesHtml = e.pairs.map(function(p) {
          return '<div class="cfg-vr-row">'
            + '<span class="cfg-vr-label">VALUE</span>'
            + '<span class="cfg-vr-val">' + escHtml(p.value) + '</span>'
            + '<span class="cfg-vr-label">REVENUE</span>'
            + '<span class="cfg-vr-rev">' + escHtml(p.revenue) + '</span>'
            + '</div>';
        }).join('');

        var pairsSubRow = '<tr class="cfg-pairs-row' + convLast + '" data-conv-pairs="' + rowKey + '" style="display:none;">'
          + '<td colspan="5"><div class="cfg-pairs-panel">' + pairLinesHtml + '</div></td>'
          + '</tr>';

        return mainRow + pairsSubRow;
      }).join('');
    }

    return '<tbody class="cfg-group">' + parentRow + colRow + childRows + '</tbody>';
  }).join('');

  document.getElementById('cfg-grouped').innerHTML =
    '<table class="cfg-grouped-table">'
    + bodyHtml
    + '</table>';
}

/* ===== VIEW TOGGLE ===== */
function setView(view) {
  var panes = {
    cards:   document.getElementById('cfg-list'),
    table:   document.getElementById('cfg-table'),
    flat:    document.getElementById('cfg-flat'),
    grouped: document.getElementById('cfg-grouped')
  };

  /* lazy-render the just-activated view */
  if (view === 'table'   && !panes.table.dataset.rendered)   { renderTable();   panes.table.dataset.rendered   = '1'; }
  if (view === 'flat'    && !panes.flat.dataset.rendered)    { renderFlat();    panes.flat.dataset.rendered    = '1'; }
  if (view === 'grouped' && !panes.grouped.dataset.rendered) { renderGrouped(); panes.grouped.dataset.rendered = '1'; }

  Object.keys(panes).forEach(function(k) {
    panes[k].style.display = (k === view) ? 'block' : 'none';
  });

  document.querySelectorAll('.cfg-view-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-view') === view);
  });
}

function resetFilters() {
  document.querySelectorAll('.cfg-filter-pill').forEach(function(s){ s.selectedIndex = 0; });
  document.querySelector('.cfg-search input').value = '';
}

/* ===== TABS ===== */
document.querySelectorAll('.cfg-tab').forEach(function(t) {
  t.addEventListener('click', function() {
    document.querySelectorAll('.cfg-tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
  });
});

/* ===================================================
   EDIT CONFIGURATION DRAWER
   =================================================== */
var edState = { configIdx: null, conversionIdx: 0 };

function openEditDrawer(configIdx, conversionIdx) {
  var c = CONFIGS[configIdx];
  if (!c) return;

  edState.configIdx = configIdx;
  edState.conversionIdx = (typeof conversionIdx === 'number' && conversionIdx >= 0) ? conversionIdx : 0;

  /* Subtitle: full identity so users don't lose row context (especially in flat view) */
  document.getElementById('ed-subtitle').textContent =
    'ID ' + c.id + ' · ' + c.account + ' · ' + c.source + ' · ' + (c.ps || '—');

  renderEditDrawerBody();

  document.getElementById('ed-drawer').classList.add('open');
  document.getElementById('ed-backdrop').classList.add('visible');
}

function closeEditDrawer() {
  document.getElementById('ed-drawer').classList.remove('open');
  document.getElementById('ed-backdrop').classList.remove('visible');
  edState.configIdx = null;
}

function selectConversion(i) {
  edState.conversionIdx = i;
  renderEditDrawerBody();
}

function renderEditDrawerBody() {
  var c = CONFIGS[edState.configIdx];
  if (!c) return;

  var trashSvg = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 7h14M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M7 7l1 13a2 2 0 002 2h4a2 2 0 002-2l1-13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  /* Conversion Trigger card (description / chevron) */
  var html = '<div class="ed-trigger">'
    + '<div>'
    +   '<div class="ed-trigger-title">Conversion Trigger</div>'
    +   '<div class="ed-trigger-desc">Generate conversion rows by defining conversion → event → value → revenue</div>'
    + '</div>'
    + '<button class="ed-icon-btn" title="Collapse" style="color:var(--color-navy);">'
    +   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 15l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    + '</button>'
    + '</div>';

  /* Conversion Configurations header */
  html += '<div class="ed-convs-header">'
    + '<span class="ed-convs-title">Conversion Configurations</span>'
    + '<button class="ed-add-conv-btn">+ Add Conversion</button>'
    + '</div>';

  /* List of Conversion cards — selected one expands with edit form below it */
  if (!c.events || c.events.length === 0) {
    html += '<div style="padding:24px;border:0.5px dashed var(--color-border-secondary);border-radius:8px;text-align:center;color:var(--color-text-tertiary);font-size:13px;">No conversions yet — click "+ Add Conversion" to create one.</div>';
  } else {
    c.events.forEach(function(e, i) {
      var sel = (i === edState.conversionIdx);
      html += '<div class="ed-conv-card' + (sel ? ' selected' : '') + '" onclick="selectConversion(' + i + ')">'
        + '<div class="ed-conv-card-title">' + escHtml(e.source) + ' → ' + escHtml(e.outbound) + '</div>'
        + '<div class="ed-conv-card-sub">' + c.id + ' • 1 Source Event Variations</div>'
        + '<button class="ed-conv-card-trash" onclick="event.stopPropagation();" title="Delete">' + trashSvg + '</button>'
        + '</div>';

      if (sel) {
        html += renderEditConversionForm(e);
      }
    });
  }

  document.getElementById('ed-body').innerHTML = html;
}

function renderEditConversionForm(e) {
  return '<div class="ed-form">'
